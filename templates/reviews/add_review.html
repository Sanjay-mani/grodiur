{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h4 style="color:#2d6a4f;">
                    ⭐ {% if existing_review %}Edit{% else %}Write a{% endif %} Review
                </h4>
                <p class="text-muted">Product: <strong>{{ product.name }}</strong></p>
                <hr>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Your Rating</label>
                        <select name="rating" class="form-select" required>
                            <option value="">Select rating...</option>
                            <option value="5" {% if existing_review.rating == 5 %}selected{% endif %}>
                                ⭐⭐⭐⭐⭐ Excellent
                            </option>
                            <option value="4" {% if existing_review.rating == 4 %}selected{% endif %}>
                                ⭐⭐⭐⭐ Good
                            </option>
                            <option value="3" {% if existing_review.rating == 3 %}selected{% endif %}>
                                ⭐⭐⭐ Average
                            </option>
                            <option value="2" {% if existing_review.rating == 2 %}selected{% endif %}>
                                ⭐⭐ Bad
                            </option>
                            <option value="1" {% if existing_review.rating == 1 %}selected{% endif %}>
                                ⭐ Very Bad
                            </option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Your Review</label>
                        <textarea name="comment" class="form-control" rows="4"
                            placeholder="Write your experience with this product..."
                            required>{{ existing_review.comment|default:'' }}</textarea>
                    </div>
                    <button type="submit" class="btn btn-grodiur w-100">
                        {% if existing_review %}Update Review{% else %}Submit Review{% endif %}
                    </button>
                    <a href="{% url 'product_detail' product.slug %}"
                        class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
